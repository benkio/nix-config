name: macOS CI

on:
  push:
    branches:
      - "**"

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nix
        env:
          NIX_FIRST_BUILD_UID: "331"
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install nixfmt
        run: |
          nix profile install github:NixOS/nixpkgs/nixpkgs-unstable#nixfmt

      - name: Formatting and checks
        run: |
          find . -name '*.nix' -print0 | xargs -0 nixfmt -c
          nix flake check

      - name: Home-manager build
        run: |
          nix build .#homeConfigurations.benkio@macos.activationPackage
